name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: autosync_test
        ports:
          - 5436:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d autosync_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5436/autosync_test
      REDIS_URL: redis://localhost:6380
      JWT_SECRET: autosync-ci-test-secret
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '11.1.2'
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify toolchain
        run: |
          node --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter back exec prisma generate --schema=prisma/schema.prisma

      - name: Deploy migrations
        run: pnpm --filter back exec prisma migrate deploy --schema=prisma/schema.prisma

      - name: Typecheck backend
        run: pnpm --filter back run typecheck

      - name: Typecheck frontend
        run: pnpm --filter front exec tsc --noEmit

      - name: Run backend tests
        run: pnpm --filter back run test

      - name: Run frontend tests
        run: pnpm --filter front run test

      - name: Build monorepo
        run: pnpm run build
