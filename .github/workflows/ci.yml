name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: autosync_test
        ports:
          - 5436:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: |
          cd apps/api
          npx prisma generate

      - name: Run Database Migrations
        env:
          DATABASE_URL: postgresql://postgres:admin123@localhost:5436/autosync_test?schema=public
        run: |
          cd apps/api
          npx prisma migrate deploy

      - name: Run API Tests
        env:
          DATABASE_URL: postgresql://postgres:admin123@localhost:5436/autosync_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6380
          JWT_SECRET: YOUKNOWHOOOLIVESINTHESECRETTEST
          PORT: 3001
          NODE_ENV: test
        run: pnpm test:api

      - name: Run Web (Frontend) Tests
        run: pnpm test:web

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Seed test database for E2E
        env:
          DATABASE_URL: postgresql://postgres:admin123@localhost:5436/autosync_test?schema=public
        run: |
          cd apps/api
          npx prisma db seed

      - name: Run E2E Tests
        env:
          DATABASE_URL: postgresql://postgres:admin123@localhost:5436/autosync_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6380
          JWT_SECRET: YOUKNOWHOOOLIVESINTHESECRETTEST
          PORT: 3001
        run: pnpm test:e2e

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
