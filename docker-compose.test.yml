version: '3.8'

services:
  db_test:
    image: postgres:15-alpine
    container_name: autosync_db_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: autosync_test
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autosync_test"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - autosync_test_network

  redis_test:
    image: redis:7-alpine
    container_name: autosync_redis_test
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - autosync_test_network

networks:
  autosync_test_network:
    driver: bridge
