version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: autosync_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-autosync}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-autosync}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autosync_network

  redis:
    image: redis:7-alpine
    container_name: autosync_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autosync_network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: autosync_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-autosync}?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
      PORT: 3000
      # JWT_SECRET must be set via .env or provider secrets
      JWT_SECRET: ${JWT_SECRET:-autosync_super_secret_jwt_key_2026}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      APP_VERSION: ${GIT_SHA:-local}
      GIT_SHA: ${GIT_SHA:-local}
    ports:
      - "3000:3000"
    healthcheck:
      # Node 18+ has global fetch — avoids requiring curl/wget in the image.
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:3000/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - autosync_network

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: autosync_worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "apps/api/dist/shared/queue/EventsWorker.js"]
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-autosync}?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-autosync_super_secret_jwt_key_2026}
    networks:
      - autosync_network

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    container_name: autosync_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_started
    networks:
      - autosync_network

volumes:
  postgres_data:
    driver: local

networks:
  autosync_network:
    driver: bridge
